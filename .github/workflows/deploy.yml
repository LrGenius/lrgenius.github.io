name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Triggered by LrGeniusAI when docs change
  repository_dispatch:
    types: [ docs-updated ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch user-facing docs from LrGeniusAI
        run: bash scripts/fetch-docs.sh main

      - name: Install, build, and upload your site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
