name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Triggered by LrGeniusAI when docs change
  repository_dispatch:
    types: [ docs-updated ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch user-facing docs from LrGeniusAI
        run: bash scripts/fetch-docs.sh main

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow
        run: |
          INDEXNOW_KEY="fc830311a483ec68a8b6e436cb39853a"
          SITE="https://lrgenius.com"
          # Fetch sitemap and extract all URLs
          URLS=$(curl -sf "$SITE/sitemap-0.xml" | grep -oP '(?<=<loc>)[^<]+')
          if [ -z "$URLS" ]; then
            echo "No URLs found in sitemap, skipping IndexNow submission"
            exit 0
          fi
          # Build JSON array of URLs
          JSON_URLS=$(echo "$URLS" | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "lrgenius.com" \
            --arg key "$INDEXNOW_KEY" \
            --argjson urlList "$JSON_URLS" \
            '{host: $host, key: $key, urlList: $urlList}')
          echo "Submitting $(echo "$URLS" | wc -l) URLs to IndexNow..."
          HTTP_STATUS=$(curl -s -o /tmp/indexnow_response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          echo "Response: HTTP $HTTP_STATUS"
          cat /tmp/indexnow_response.txt
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "IndexNow submission failed with HTTP $HTTP_STATUS"
            exit 1
          fi
