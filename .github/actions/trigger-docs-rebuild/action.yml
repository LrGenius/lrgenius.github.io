name: Trigger docs rebuild
description: Sends a repository_dispatch event to lrgenius.github.io so it re-fetches docs from LrGeniusAI and redeploys.

inputs:
  token:
    description: >
      GitHub token with repository_dispatch permission on lrgenius/lrgenius.github.io.
      Use a PAT (classic) or a fine-grained token scoped to that repo with
      "Contents: Read and write" (which covers dispatches).
    required: true

runs:
  using: composite
  steps:
    - name: Dispatch docs-updated event
      shell: bash
      run: |
        response=$(curl -sS -w "\n%{http_code}" \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/lrgenius/lrgenius.github.io/dispatches \
          -d '{"event_type":"docs-updated"}')
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | head -n-1)
        if [[ "$http_code" != "204" ]]; then
          echo "Dispatch failed (HTTP $http_code): $body"
          exit 1
        fi
        echo "docs-updated dispatch sent — website rebuild triggered."
